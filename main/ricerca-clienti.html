<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ricerca Clienti - Credipass</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<style>
    body { font-family: 'Poppins', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
    .search-container { background-color: #ffffff; width: 100%; max-width: 800px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border-top: 6px solid #002d72; }
    
    .header { background-color: #f8f9fa; padding: 30px 40px; text-align: center; border-bottom: 1px solid #e9ecef; }
    .header h1 { color: #002d72; margin: 0; font-size: 24px; font-weight: 800; }

    .search-box { padding: 20px 40px; background: #002d72; }
    .search-input-wrapper { position: relative; width: 100%; }
    .search-input-wrapper i { position: absolute; left: 15px; top: 15px; color: #777; }
    .search-input { width: 100%; padding: 15px 15px 15px 45px; border-radius: 8px; border: none; font-size: 16px; font-family: 'Poppins', sans-serif; box-sizing: border-box; outline: none; }
    .search-input:focus { box-shadow: 0 0 0 3px rgba(201, 151, 0, 0.5); }

    .client-list { padding: 20px 40px; min-height: 300px; }
    
    .client-card { display: flex; align-items: center; justify-content: space-between; border: 1px solid #e9ecef; border-left: 6px solid #ccc; padding: 15px 20px; border-radius: 8px; margin-bottom: 10px; transition: 0.2s; background: #fff; }
    .client-card:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
    
    .status-completo { border-left-color: #28a745; background-color: #f8fff9; }
    .status-incompleto { border-left-color: #ffc107; background-color: #fffdf5; }
    .status-vuoto { border-left-color: #dc3545; background-color: #fff; }

    .client-info-container { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 15px; }
    
    .client-data { flex-grow: 1; cursor: pointer; }
    .client-data h3 { margin: 0 0 5px 0; font-size: 16px; color: #333; display: flex; align-items: center; gap: 8px; }
    .client-data p { margin: 0; font-size: 12px; color: #777; }
    
    .badge-status { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; color: white; }
    .badge-verde { background: #28a745; }
    .badge-giallo { background: #ffc107; color: #856404; }
    .badge-rosso { background: #dc3545; }
    
    .client-actions { display: flex; align-items: center; gap: 15px; }
    .btn-fascicolo { color: #002d72; font-weight: bold; font-size: 13px; text-decoration: none; padding: 8px 12px; background: #eef2f7; border-radius: 6px; transition: 0.2s; cursor: pointer; }
    .btn-fascicolo:hover { background: #002d72; color: white; }
    
    .btn-delete { color: #dc3545; background: none; border: none; font-size: 18px; cursor: pointer; padding: 5px; transition: 0.2s; border-radius: 4px; }
    .btn-delete:hover { background: #fee; transform: scale(1.1); }
    
    .loading { text-align: center; padding: 30px; color: #002d72; display: none; }
    .no-results { text-align: center; padding: 30px; color: #777; display: none; }
</style>
</head>
<body>

<div class="search-container">
    <div class="header">
        <h1>Archivio Pratiche</h1>
        <p style="color: #C99700; margin-top:5px; font-weight:600;">Gestione e Ricerca Clienti</p>
    </div>

    <div class="search-box">
        <div class="search-input-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Cerca per nome o cognome..." onkeyup="filtraClienti()">
        </div>
    </div>

    <div class="client-list">
        <div id="loadingIndicator" class="loading"><i class="fas fa-spinner fa-spin fa-2x"></i><p>Caricamento archivio in corso...</p></div>
        <div id="noResults" class="no-results">Nessun cliente trovato.</div>
        <div id="clientiContainer"></div>
    </div>
</div>

<script>
    var firebaseConfig = {
        apiKey: "AIzaSyDDRWJpEhFb2zBB9MlkbEel_9cXOTTKBJ4",
        authDomain: "consulenza-credipass.firebaseapp.com",
        projectId: "consulenza-credipass",
        storageBucket: "consulenza-credipass.firebasestorage.app"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    var db = firebase.firestore();
    var storage = firebase.storage();
    var tuttiIClienti = []; 

    async function caricaClientiDaDB() {
        document.getElementById('loadingIndicator').style.display = 'block';
        tuttiIClienti = []; // Resetta l'array per ricaricarlo pulito
        
        try {
            const querySnapshot = await db.collection("pratiche_mutuo").get();
            
            querySnapshot.forEach((doc) => {
                const idDocumento = doc.id;
                const datiDoc = doc.data();
                
                let nomeReale = datiDoc.nomeCliente || idDocumento.replace(/_/g, ' ');
                const nomeFormattato = nomeReale.toUpperCase();
                
                tuttiIClienti.push({
                    idOriginale: idDocumento,
                    nomeRicerca: nomeFormattato,
                    dati: datiDoc
                });
            });

            document.getElementById('loadingIndicator').style.display = 'none';
            mostraClienti(tuttiIClienti);

        } catch (error) {
            console.error(error);
            alert("Errore di connessione a Firebase.");
            document.getElementById('loadingIndicator').style.display = 'none';
        }
    }

    function mostraClienti(lista) {
        const container = document.getElementById('clientiContainer');
        const noResults = document.getElementById('noResults');
        container.innerHTML = '';

        if (lista.length === 0) {
            noResults.style.display = 'block'; return;
        } else {
            noResults.style.display = 'none';
        }

        lista.forEach(cliente => {
            const card = document.createElement('div');
            
            const chiaviCaricate = Object.keys(cliente.dati).filter(k => k !== 'totaleRichiesti' && k !== 'nomeCliente' && k !== 'richiestaIntegrazioneAttiva' && k !== 'notaPerCliente' && k !== 'elencoDocRichiesti' && k !== 'ultimoInvioNotifica' && k !== 'ultimo_aggiornamento_scheda' && k !== 'importo_richiesto' && k !== 'valore_immobile' && k !== 'reddito_richiedente_1' && k !== 'reddito_richiedente_2' && k !== 'durata_mutuo' && k !== 'finalita' && k !== 'prodotto' && k !== 'tasso' && k !== 'cliente_email' && k !== 'cliente_cell');
            const fileCaricati = chiaviCaricate.length;
            const fileRichiesti = cliente.dati.totaleRichiesti || 0; 
            
            let classeStato = "status-vuoto"; 
            let badgeHtml = `<span class="badge-status badge-rosso"><i class="fas fa-folder-open"></i> APERTA</span>`; 
            let testoInfo = `Pratica Inserita`;

            if (fileRichiesti > 0 && fileCaricati >= fileRichiesti) {
                classeStato = "status-completo";
                badgeHtml = `<span class="badge-status badge-verde"><i class="fas fa-check-circle"></i> COMPLETO</span>`;
                testoInfo = `Documenti acquisiti`;
            } else if (fileCaricati > 0) {
                classeStato = "status-incompleto";
                badgeHtml = `<span class="badge-status badge-giallo"><i class="fas fa-exclamation-triangle"></i> IN CORSO</span>`;
                testoInfo = `${fileCaricati} Documenti caricati`;
            }

            card.className = `client-card ${classeStato}`;
            card.innerHTML = `
                <div class="client-info-container">
                    <div class="client-data" onclick="window.location.href='dashboard-consulente.html?clienteId=${cliente.idOriginale}'">
                        <h3><i class="fas fa-user-circle" style="color:#002d72;"></i> ${cliente.nomeRicerca} ${badgeHtml}</h3>
                        <p>ID: ${cliente.idOriginale} <br> ${testoInfo}</p>
                    </div>
                    <div class="client-actions">
                        <button class="btn-delete" title="Elimina Pratica" onclick="eliminaPratica('${cliente.idOriginale}', '${cliente.nomeRicerca}')">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                        <div class="btn-fascicolo" onclick="window.location.href='dashboard-consulente.html?clienteId=${cliente.idOriginale}'">
                            Apri <i class="fas fa-chevron-right"></i>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function filtraClienti() {
        const termine = document.getElementById('searchInput').value.toUpperCase();
        const filtrati = tuttiIClienti.filter(c => c.nomeRicerca.includes(termine));
        mostraClienti(filtrati);
    }

    // --- FUNZIONE DI ELIMINAZIONE DEFINITIVA ---
    async function eliminaPratica(idPratica, nomeCliente) {
        const conferma = confirm(`ATTENZIONE!\n\nSei sicuro di voler eliminare definitivamente la pratica di: ${nomeCliente}?\n\nQuesta azione cancellerà tutti i dati e i documenti dal Cloud in modo irreversibile.`);
        
        if (!conferma) return; // Se l'utente clicca Annulla, si ferma qui

        document.getElementById('loadingIndicator').innerHTML = '<i class="fas fa-trash-alt fa-bounce fa-2x" style="color:#dc3545;"></i><p>Eliminazione pratica in corso...</p>';
        document.getElementById('loadingIndicator').style.display = 'block';
        document.getElementById('clientiContainer').innerHTML = ''; // Nasconde la lista durante l'operazione

        try {
            // 1. ELIMINA LA CARTELLA DEI FILE DALLO STORAGE (Se esiste)
            const listRef = storage.ref(`Fascicoli/${idPratica}`);
            try {
                const res = await listRef.listAll();
                // Cancella tutti i file uno per uno (Firebase non fa cancellare le cartelle piene in un colpo solo)
                const deletePromises = res.items.map((itemRef) => itemRef.delete());
                await Promise.all(deletePromises);
                console.log(`Cartella Storage per ${idPratica} svuotata.`);
            } catch (e) {
                console.log(`Nessun file trovato nello Storage per ${idPratica}, o cartella inesistente.`);
            }

            // 2. ELIMINA IL DOCUMENTO DAL DATABASE (FIRESTORE)
            await db.collection("pratiche_mutuo").doc(idPratica).delete();
            console.log(`Dati Firestore per ${idPratica} eliminati.`);

            alert(`✅ Pratica di ${nomeCliente} eliminata con successo dal Database e dallo Spazio di Archiviazione.`);
            
            // Ricarica la lista pulita
            document.getElementById('searchInput').value = ""; // Resetta la barra di ricerca
            await caricaClientiDaDB();

        } catch (error) {
            console.error("Errore durante l'eliminazione:", error);
            alert("❌ Errore durante l'eliminazione della pratica. Riprova.");
            document.getElementById('loadingIndicator').style.display = 'none';
            caricaClientiDaDB(); // Ricarica la pagina in caso di errore per sicurezza
        }
    }

    window.onload = caricaClientiDaDB;
</script>
</body>
</html>
