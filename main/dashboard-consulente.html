<script>

    const db = firebase.firestore();

    const idCliente = new URLSearchParams(window.location.search).get('clienteId');

    const TRADUZIONI = {
        'ci1': "Carta d'Identità R1",
        'ci2': "Carta d'Identità R2",
        'ts1': "Tessera Sanitaria R1",
        'ts2': "Tessera Sanitaria R2",

        'cud2': "Certificazione Unica R2",

        'unici2': "Modello Redditi R2",
        'f241': "F24 R1",
        'f242': "F24 R2",
        'visura1': "Visura Camerale R1",

        'preliminare': "Preliminare / Proposta",

    };

    const DB_SELECT = {
        'ANAGRAFICA': [
            {id:'ci1', n:"Carta d'Identità R1"},
            {id:'ci2', n:"Carta d'Identità R2"},
            {id:'ts1', n:"Tessera Sanitaria R1"},
            {id:'ts2', n:"Tessera Sanitaria R2"},
            {id:'residenza1', n:"Certificato Cumulativo"},
            {id:'isee', n:"ISEE"},
            {id:'matrimonio', n:"Atto Matrimonio"}
        ],
        'REDDITO': [
            {id:'bustepaga1', n:"Buste Paga R1"},
            {id:'bustepaga2', n:"Buste Paga R2"},
            {id:'cud1', n:"Certificazione Unica R1"},
            {id:'cud2', n:"Certificazione Unica R2"},
            {id:'unici1', n:"Modello Redditi R1"},
            {id:'unici2', n:"Modello Redditi R2"},
            {id:'f241', n:"F24 R1"},
            {id:'f242', n:"F24 R2"},
            {id:'contratto', n:"Contratto di Lavoro"},
            {id:'visura1', n:"Visura Camerale R1"},
            {id:'visura2', n:"Visura Camerale R2"}
        ],
        'BANCA': [

            {id:'ec2', n:"Estratto Conto R2"},
            {id:'mov1', n:"Movimenti R1"},
            {id:'mov2', n:"Movimenti R2"},
            {id:'prestiti', n:"Contratti Prestiti"},
            {id:'mutuo_pre', n:"Atto Mutuo in Corso"}
        ],
        'IMMOBILE': [
            {id:'atto', n:"Atto Provenienza"},
            {id:'planimetria', n:"Planimetria"},
            {id:'visuracat', n:"Visura Catastale"},

        ],
        'ALTRO': [

            {id:'extra1', n:"Documento Integrativo"},
            {id:'extra2', n:"Chiarimento / Nota"}
        ]
    };

    let carrello = [];
    let emailCliente = "";

    function formatCurrencyIT(value) {
        if (value === null || value === undefined) return "";
        let s = String(value).trim();
        if (!s || s === "-" || s === "N/D" || s === " ") return "";

        s = s.replace(/€/g, '').replace(/\s/g, '');

        const parts = s.split(',');
        const intPart = parts[0].replace(/\./g, '').replace(/[^\d-]/g, '');

        if (intPart === "" || isNaN(Number(intPart))) return String(value).trim();

        const formattedInt = Number(intPart).toLocaleString('it-IT');
        return parts.length > 1 ? `${formattedInt},${parts[1]}` : formattedInt;
    }

    function formatEuro(value) {
        const formatted = formatCurrencyIT(value);
        return formatted ? `${formatted} €` : "";
    }

    function normalizeDisplay(value) {
        if (value === null || value === undefined) return "";
        const s = String(value).trim();
        if (!s || s === "-" || s === "N/D" || s === " ") return "";
        return s;
    }

    function formatBooleanItalian(value) {
        const s = normalizeDisplay(value).toLowerCase();
        if (!s) return "";
        if (s === 'si' || s === 'sì' || s === 'true') return 'Sì';
        if (s === 'no' || s === 'false') return 'No';
        return value;
    }

    function prettyClientLabel(id) {
        return String(id || '').replace(/[_-]/g, ' ').replace(/\s+/g, ' ').trim().toUpperCase();
    }

    window.onload = () => {
        if (idCliente) {
            document.getElementById('labelCliente').innerText = prettyClientLabel(idCliente);
            caricaDocumenti();
            caricaIdentikitCompleto();
            cambiaCategoria('ANAGRAFICA', document.querySelector('.filter-btn'));
        } else {
            document.getElementById('documentiArea').innerHTML = '<div class="empty-state">Cliente non specificato nell’URL.</div>';
            document.getElementById('identikitDinamico').innerHTML = '<div class="empty-state">Cliente non specificato.</div>';
        }
    };

    async function caricaIdentikitCompleto() {
        const container = document.getElementById('identikitDinamico');

        try {
            const doc = await db.collection("pratiche_mutuo").doc(idCliente).get();

            if (!doc.exists) {
                container.innerHTML = "<p style='text-align:center; padding:20px; font-size:12px; color:#999;'>Dati pratica non trovati.</p>";
                return;
            }

            const d = doc.data() || {};
            emailCliente = d.cliente_email || "";

            const row = (label, val) => {
                const clean = normalizeDisplay(val);
                if (!clean) return "";
                return `
                    <div class="data-row">
                        <span class="data-label">${label}:</span>
                        <span class="data-value">${clean}</span>
                    </div>
                `;
            };

            const rowEuro = (label, val) => {
                const clean = formatEuro(val);
                if (!clean) return "";
                return `
                    <div class="data-row">
                        <span class="data-label">${label}:</span>
                        <span class="data-value">${clean}</span>
                    </div>
                `;
            };

            let html = "";

            let gMutuo = "";
            gMutuo += row("Finalità", d.finalita);
            gMutuo += rowEuro("Importo richiesto", d.importo_richiesto || d.mutuo_importo);
            gMutuo += rowEuro("Compravendita", d.valore_compravendita || d.mutuo_compravendita);
            gMutuo += rowEuro("Valore immobile", d.valore_immobile || d.immobile_valore);
            gMutuo += row("Prodotto", d.prodotto);
            gMutuo += row("Tasso", d.tasso);
            gMutuo += row("Durata", normalizeDisplay(d.durata_mutuo) ? `${d.durata_mutuo} anni` : "");

            if (gMutuo) {
                html += `<div class="data-group"><span class="data-group-title">Operazione Mutuo</span>${gMutuo}</div>`;
            }

            let gR1 = "";
            gR1 += row("Nominativo", d.cliente_nome);
            gR1 += row("Contratto", d.lav1 || d.contratto_richiedente_1);
            gR1 += rowEuro("Reddito netto", d.reddito_richiedente_1 || d.cliente_reddito);
            gR1 += row("Cellulare", d.cliente_cell);
            gR1 += row("Email", d.cliente_email);

            if (gR1) {
                html += `<div class="data-group"><span class="data-group-title">1° Richiedente</span>${gR1}</div>`;
            }

            const esisteSecondo =
                normalizeDisplay(d.cliente2_nome) ||
                normalizeDisplay(d.cliente2_email) ||
                normalizeDisplay(d.cliente2_cell) ||
                normalizeDisplay(d.reddito_richiedente_2) ||
                normalizeDisplay(d.lav2);

            if (esisteSecondo) {
                let gR2 = "";
                gR2 += row("Nominativo", d.cliente2_nome);
                gR2 += row("Contratto", d.lav2 || d.contratto_richiedente_2);
                gR2 += rowEuro("Reddito netto", d.reddito_richiedente_2 || d.cliente2_reddito);
                gR2 += row("Cellulare", d.cliente2_cell);
                gR2 += row("Email", d.cliente2_email);

                if (gR2) {
                    html += `<div class="data-group"><span class="data-group-title">2° Richiedente</span>${gR2}</div>`;
                }
            }

            let gFam = "";
            gFam += row("Stato civile", d.stato_civile || d.stato);
            gFam += row("N. componenti", d.num_componenti);

            const assegnoValue = formatBooleanItalian(d.assegno);
            const assegnoImporto = formatEuro(d.assegno_importo);
            if (assegnoValue || assegnoImporto) {
                gFam += row("Assegno unico", `${assegnoValue || "Sì"}${assegnoImporto ? ` (${assegnoImporto})` : ""}`);
            }

            const etaFigli = [d.eta_f1, d.eta_f2, d.eta_f3]
                .map(x => normalizeDisplay(x))
                .filter(Boolean);

            if (etaFigli.length > 0) {
                gFam += row("Numero figli", String(etaFigli.length));
                gFam += row("Età figli", etaFigli.join(", "));
            }

            gFam += row("Situazione abitativa", d.sit_abitativa);

            if ((normalizeDisplay(d.sit_abitativa)).toLowerCase() === "affitto") {
                gFam += rowEuro("Canone affitto", d.canone_affitto);
                gFam += row("Contratto registrato", formatBooleanItalian(d.contratto_reg));
            }

            if (gFam) {
                html += `<div class="data-group"><span class="data-group-title">Famiglia e Casa</span>${gFam}</div>`;
            }

            let gCosti = "";
            if (normalizeDisplay(d.gia_mutuo) || normalizeDisplay(d.rata_mutuo_pre)) {
                gCosti += row("Mutuo in corso", `${formatBooleanItalian(d.gia_mutuo) || "Sì"}${formatEuro(d.rata_mutuo_pre) ? ` (${formatEuro(d.rata_mutuo_pre)})` : ""}`);
            }

            if (normalizeDisplay(d.fin_corso) || normalizeDisplay(d.rata_fin_pre)) {
                gCosti += row("Finanziamenti", `${formatBooleanItalian(d.fin_corso) || "Sì"}${formatEuro(d.rata_fin_pre) ? ` (${formatEuro(d.rata_fin_pre)})` : ""}`);
            }

            gCosti += row("Polizza incendio", d.tipo_incendio);
            gCosti += row("Importo polizza incendio", d.importo_incendio);
            gCosti += row("Polizza personale", d.tipo_Personale || d.tipo_personale);
            gCosti += row("Importo polizza personale", d.importo_Personale || d.importo_personale);
            gCosti += rowEuro("Istruttoria banca", d.istr_banca);
            gCosti += rowEuro("Perizia", d.perizia_costo);
            gCosti += row("Imposta sostitutiva", d.imposta);
            gCosti += row("Mediazione", d.mediazione);

            if (gCosti) {
                html += `<div class="data-group"><span class="data-group-title">Impegni e Costi Istruttoria</span>${gCosti}</div>`;
            }

            let gNote = "";
            gNote += row("Luogo incontro", d.luogo_incontro || d.campo_luogo);
            gNote += row("Data consulenza", d.data_consulenza || d.campo_data);
            gNote += row("Referente", d.referente || d.campo_referente);
            gNote += row("Note", d.note_consulenza);

            if (gNote) {
                html += `<div class="data-group"><span class="data-group-title">Note e Riferimenti</span>${gNote}</div>`;
            }

            container.innerHTML = html || `<p style="text-align:center; padding:20px; font-size:12px; color:#999;">Nessun dato disponibile.</p>`;
        } catch (e) {
            console.error("Errore identikit:", e);
            container.innerHTML = "<p style='text-align:center; padding:20px; font-size:12px; color:#c00;'>Errore nel caricamento dell'identikit.</p>";
        }
    }

    async function caricaDocumenti() {
        const loading = document.getElementById('loading');
        const varianti = [
            idCliente,
            idCliente.replace(/_/g, ' '),
            idCliente.replace(/_/g, '-')
        ];

        let files = [];

        for (let v of varianti) {
            try {
                const res = await storage.ref(`Fascicoli/${v}`).listAll();
                if (res.items.length > 0) {
                    files = res.items;
                    break;
                }
            } catch (e) {}
        }

        if (loading) loading.style.display = 'none';

        if (files.length === 0) {
            document.getElementById('documentiArea').innerHTML += '<p class="empty-state">Nessun documento caricato dal cliente.</p>';
            return;
        }

        for (const item of files) {
            try {
                const url = await item.getDownloadURL();
                const fn = item.name.toLowerCase();

                let cat = 'ALTRO';
                let nomeBello = item.name;

                if (fn.includes('ci') || fn.includes('ts') || fn.includes('residenza') || fn.includes('isee') || fn.includes('matrimonio')) {
                    cat = 'ANAGRAFICA';
                } else if (fn.includes('busta') || fn.includes('cud') || fn.includes('unici') || fn.includes('iva') || fn.includes('f24') || fn.includes('visura1') || fn.includes('visura2') || fn.includes('contratto')) {
                    cat = 'REDDITO';
                } else if (fn.includes('ec1') || fn.includes('ec2') || fn.includes('mov') || fn.includes('conto') || fn.includes('prestiti') || fn.includes('mutuo_pre')) {
                    cat = 'BANCA';
                } else if (fn.includes('atto') || fn.includes('planimetria') || fn.includes('visura') || fn.includes('preliminare') || fn.includes('preventivo')) {
                    cat = 'IMMOBILE';
                }

                for (const [key, val] of Object.entries(TRADUZIONI)) {
                    if (fn.includes(key)) {
                        nomeBello = val;
                        break;
                    }
                }

                const containerCat = document.getElementById(`cat-${cat}`);
                const listCat = document.getElementById(`list-${cat}`);

                if (containerCat && listCat) {
                    containerCat.style.display = 'block';
                    listCat.innerHTML += `
                        <div class="doc-item">
                            <div>
                                <span class="doc-name">${nomeBello}</span>
                                <span class="doc-filename">${item.name}</span>
                            </div>
                            <a href="${url}" target="_blank" class="btn-view">VEDI</a>
                        </div>
                    `;
                }
            } catch (err) {
                console.error("Errore file:", item.name, err);
            }
        }
    }

    function cambiaCategoria(cat, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');

        const select = document.getElementById('selectIntegrazione');
        select.innerHTML = (DB_SELECT[cat] || []).map(d => `<option value="${d.id}">${d.n}</option>`).join('');
    }

    function aggiungiChecklist() {
        const sel = document.getElementById('selectIntegrazione');
        if (!sel || !sel.value) return;

        const val = sel.value;
        const txt = sel.options[sel.selectedIndex].text;

        if (carrello.some(x => x.id === val)) return;

        carrello.push({ id: val, testo: txt });
        renderCarrello();
    }

    function removeFromCarrello(id) {
        carrello = carrello.filter(x => x.id !== id);
        renderCarrello();
    }

    function renderCarrello() {
        const c = document.getElementById('listaCarrello');
        const btnInvia = document.getElementById('btnInvia');

        btnInvia.disabled = carrello.length === 0;
        btnInvia.style.opacity = carrello.length === 0 ? 0.5 : 1;

        if (carrello.length === 0) {
            c.innerHTML = '<div style="font-size:11px; color:#999; text-align:center; padding:10px;">Nessun documento selezionato.</div>';
            return;
        }

        c.innerHTML = carrello.map(item => `
            <div class="checklist-item">
                <span>${item.testo}</span>
                <i class="fas fa-trash trash-btn" onclick="removeFromCarrello('${item.id}')"></i>
            </div>
        `).join('');
    }

    async function inviaIntegrazione() {
        const nota = document.getElementById('notaIntegrazione').value.trim();
        const btn = document.getElementById('btnInvia');

        if (!emailCliente) {
            alert("Attenzione: email cliente non trovata.");
            return;
        }

        if (carrello.length === 0) {
            alert("Aggiungi almeno un documento alla richiesta.");
            return;
        }

        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> INVIO...';
        btn.disabled = true;

        const elencoHtml = carrello.map(i => `<li>${i.testo}</li>`).join('');

        const uploadUrl = `${window.location.origin}/upload.html?id=${encodeURIComponent(idCliente)}`;

        const emailHtml = `
<!DOCTYPE html>
<html lang="it">
<body style="margin:0;padding:0;background-color:#f4f7f6;font-family:Arial,sans-serif;">
    <table width="100%" bgcolor="#f4f7f6" cellpadding="0" cellspacing="0" border="0" style="padding:30px 10px;">
        <tr>
            <td align="center">
                <table width="600" bgcolor="#ffffff" style="border-radius:12px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.1);border:1px solid #eee;">
                    <tr>
                        <td bgcolor="#002d72" align="center" style="padding:25px;border-bottom:5px solid #C99700;">
                            <img src="https://consulenza-credipass.it/images/logo-credipass.png" width="200" alt="Credipass">
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:30px;">
                            <h2 style="color:#002d72;margin-top:0;">Integrazione Documenti</h2>
                            <p style="color:#555;line-height:1.6;">
                                Gentile Cliente, per procedere con la tua pratica abbiamo bisogno di integrare i seguenti documenti:
                            </p>

                            <div style="background:#f8f9fa;padding:15px;border-left:4px solid #002d72;margin:20px 0;">
                                <ul style="margin:0;padding-left:20px;color:#002d72;font-weight:bold;">
                                    ${elencoHtml}
                                </ul>
                            </div>

                            ${nota ? `
                            <p style="background:#fff9e6;padding:15px;border:1px dashed #C99700;border-radius:8px;font-style:italic; color:#444;">
                                "${nota}"
                            </p>
                            ` : ''}

                            <div align="center" style="margin-top:30px;">
                                <a href="${uploadUrl}" style="background:#C99700;color:white;padding:16px 30px;text-decoration:none;border-radius:8px;font-weight:bold;display:inline-block;">
                                    CARICA DOCUMENTI
                                </a>
                            </div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>`;

        try {
            await db.collection("pratiche_mutuo").doc(idCliente).set({
                richiestaIntegrazioneAttiva: true,
                notaPerCliente: nota,
                elencoDocRichiesti: carrello.map(x => x.id),
                ultimoAggiornamentoIntegrazione: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });

            const response = await fetch('/api/send-email', {
                method:'POST',
                headers:{ 'Content-Type':'application/json' },
                body: JSON.stringify({
                    to: [emailCliente],
                    subject: `Integrazione Documenti - ${prettyClientLabel(idCliente)}`,
                    html: emailHtml
                })
            });

            if (!response.ok) {
                throw new Error("Invio email non riuscito");
            }

            alert("✅ Email inviata con successo!");
            location.reload();
        } catch (e) {
            console.error("Errore invio integrazione:", e);
            alert("Errore durante l'invio.");
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane"></i> INVIA NOTIFICA AL CLIENTE';
        }
    }

    async function scaricaTuttoZip() {
        const btn = document.getElementById('btnZip');
        const oldTxt = btn.innerHTML;

        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creazione Archivio...';
        btn.disabled = true;

        const zip = new JSZip();

        try {
            const varianti = [
                idCliente,
                idCliente.replace(/_/g, ' '),
                idCliente.replace(/_/g, '-')
            ];

            let items = [];

            for (let v of varianti) {
                try {
                    const res = await storage.ref(`Fascicoli/${v}`).listAll();
                    if (res.items.length > 0) {
                        items = res.items;
                        break;
                    }
                } catch (e) {}
            }

            if (items.length === 0) {
                alert("Nessun file presente.");
                btn.disabled = false;
                btn.innerHTML = oldTxt;
                return;
            }

            for (const item of items) {
                const url = await item.getDownloadURL();
                const resp = await fetch(url);
                const blob = await resp.blob();
                zip.file(item.name, blob);
            }

            const content = await zip.generateAsync({ type: "blob" });
            saveAs(content, `Fascicolo_${idCliente}.zip`);

            btn.innerHTML = oldTxt;
            btn.disabled = false;
        } catch (e) {
            console.error("Errore ZIP:", e);
            alert("Errore durante la creazione dello ZIP.");
            btn.disabled = false;
            btn.innerHTML = oldTxt;
        }
    }

    async function apriReportAI() {
        document.getElementById('modalAI').style.display = 'flex';
        const b = document.getElementById('aiBody');
        b.innerHTML = 'Generazione report in corso...';

        try {
            const snap = await db.collection("analisi_deliberante").doc(idCliente).get();

            if (!snap.exists) {
                b.innerHTML = "L'intelligenza artificiale non ha ancora elaborato questa pratica.";
                return;
            }

            const report = snap.data()?.praticaCompleta?.practiceSummary?.reportTestuale || "Report non disponibile.";
            b.innerHTML = `
                <pre style="white-space:pre-wrap; background:#f8f9fa; padding:15px; border-radius:10px; font-family:inherit; font-size:13px; color:#444; border:1px solid #ddd;">${report}</pre>
            `;
        } catch (e) {
            console.error("Errore report AI:", e);
            b.innerHTML = "Errore nel caricamento del report AI.";
        }
    }

    document.getElementById('modalAI').addEventListener('click', (e) => {
        if (e.target.id === 'modalAI') {
            document.getElementById('modalAI').style.display = 'none';
        }
    });
</script>
